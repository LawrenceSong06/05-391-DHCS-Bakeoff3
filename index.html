<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Bakeoff 3</title>
		<link rel="stylesheet" type="text/css" href="CSS/variables.css">
		<link rel="stylesheet" type="text/css" href="CSS/icons.css">
		<link rel="stylesheet" type="text/css" href="CSS/theme.css">
		<link rel="stylesheet" type="text/css" href="CSS/layout.css">
		<link rel="stylesheet" type="text/css" href="CSS/components.css">
		<link rel="stylesheet" type="text/css" href="CSS/base.css">
		<link rel="stylesheet" type="text/css" href="CSS/main.css">
	</head>
	<body>
		<div id="main">
			<!-- The Sidebar that contains all filter and orders -->
			<div id="sidebar" class="card1 color-secondary flex flex-column flex-justify-start flex-align-start g1">
				<div class="flex flex-column flex-align-center span-width padding2">
					<h2 class="iconfont padding1">&#xe665;</h2>
					<h2 class="nopadding">FILTER&SORT</h2>
				</div>
				<hr/>
				
				<!-- The form that contains information about the filters and orders applied -->
				<form id="filter-sort" class="span-width overflow-y-scroll overflow-x-hidden flex-fill scrollbar">

					<!-- The filters -->
					<div id="filters" class="flex flex-column dropdown span-width">
						<div class="flex flex-row flex-nowrap btn noborder toggle-dropdown span-width">
							<h3 class = "card3 nomargin">
								<span class="iconfont">&#xe839;</span> 
								Filter
							</h3>
						</div>
	
						<!-- The menu to filter by genre -->
						<div class="flex flex-column flex-align-start card3 round dropdown-content padding_5">
							<div class="dropdown span-width">
								<h4 class="padding_5 btn noborder span-width flex flex-row toggle-dropdown">
									Genre
								</h4>

								<div class="dropdown-content padding_5" id="genre-form">
									<!-- This is left blank for JS to fill -->
									<!-- We do not know the genres until the data is fetched -->
								</div>
							</div>

						</div>

						<hr/>

						<!-- Filtering by actors -->
						<div class="flex flex-column flex-align-start card3 round dropdown-content padding_5">
							<div class="dropdown span-width">
								<h4 class="padding_5 btn noborder span-width flex flex-row toggle-dropdown">
									Actor
								</h4>

								
								<!-- The core part of actor filter -->
								<div class="dropdown-content padding_5" id="actor-form">
									<span>Excludes: </span>
									<div id="excluded_actors" class="flex flex-row">

									</div>

									<br/>

									<span>Includes: </span>

									<br/>

									<div id="included_actors" class="flex flex-row">
										<!-- These are the selected actors to be included. The input with -->
										<!-- hidden as its type will be placed here, along with a <p> -->
										<!-- demonstrating what is added. If one of those <p> is clicked, an added
											actor will be removed from the list -->
									</div>
											
									<strong>
										Search for an actor:
									</strong>
									<br/>

									<input id="search_actor" type="text" class="btn noborder bottom-border nobackground">

									<div class="switch btn nopadding noborder round">												
										<label for="end-time-option" class="active">
											<input type="radio" name="actor-option" value="include" checked>
											Include
										</label>
										<label for="end-time-option">
											<input type="radio" name="actor-option" value="exclude">
											Exclude
										</label>
									</div>
									
									<br/>

									<div id="actor_prompts">
										<!-- This is the prompting area, which will later be filled by prompting 
										 implemented by JS -->
									</div>
								</div>
							</div>

						</div>

						<hr/>

						<!-- The filter by time -->
						<div class="flex flex-column flex-align-start card3 round dropdown-content padding_5">
							<div class="dropdown span-width">
								<h4 class="padding_5 btn noborder span-width flex flex-row toggle-dropdown">
									Time
								</h4>

								<!-- Filter by start time -->
								<div class="dropdown-content padding_5" id="time-form">
									<div class="flex flex-row gap-1">										
										<div class="flex flex-row flex-align-center">
											<div class="flex flex-column">
												<strong>Starts</strong>
	
												<div class="switch btn nopadding noborder round">												
													<label for="start-time-option" class="active">
														<input type="radio" name="start-time-option" value="before" checked>
														before
													</label>
													<label for="start-time-option">
														<input type="radio" name="start-time-option" value="after">
														after
													</label>
												</div>
												<input type="time" name="start-time">
											</div>
										</div>
	
										<br/>
	
										<!-- Filter by end time -->
										<div class="flex flex-row flex-align-center">
											<div class="flex flex-column">
												<strong>Ends</strong>
	
												<div class="switch btn nopadding noborder round">												
													<label for="end-time-option" class="active">
														<input type="radio" name="end-time-option" value="Before" checked>
														before
													</label>
													<label for="end-time-option">
														<input type="radio" name="end-time-option" value="after">
														after
													</label>
												</div>
												<input type="time" name="end-time">
											</div>
										</div>
									</div>

									<br/>

									<!-- Filter by movie length -->
									<label>
										<strong>Length</strong>
										<br/>
										<label for="min-length" id="min-length-label"></label>
										<strong>--</strong>
										<label for="max-length" id="max-length-label"></label>
									</label>

									<div class="flex flex-column">
										<input type="range" id="min-length" step="5" min="0" value="0" name="min-length">
										<input type="range" id="max-length" step="5" min="0" name="max-length">
									</div>

								</div>
							</div>

						</div>
					</div>
					
					<hr/>
	
					<!-- The sorting orders -->
					<div id="sort" class="flex flex-column dropdown span-width">
						<div class="flex flex-row flex-nowrap btn noborder toggle-dropdown span-width">
							<h3 class = "card3 nomargin">
								<span class="iconfont">&#xe70c;</span> 
								Sort
							</h3>
						</div>
						
						<!-- Only one sorting will be applied. -->
						<!-- Particularly, one of the following: -->
						<!-- Relevance (to the filtering options), time (chronologically), 
						 length (from short to long), and title (alphabetically) -->
						<div id="sorting form" class="flex flex-column flex-align-start card3 round dropdown-content">
							<h4 class="padding_5 span-width">Order:</h4>
							<div class="btn round middle-icon half-margin" id="reverse-order">
								<input type="checkbox" name="reverse-order"/>
								<div class="iconfont"></div>
							</div>

							<h4 class="padding_5 span-width">Sort By:</h4>
							<label class="btn span-width half-margin noborder">
								<input type="radio" name="sort" value="relevance" checked>
								<span class="positive-order">Highest</span> 
								<span class="negative-order">Lowest</span> 
								Relevance
							</label>
							<label class="btn span-width half-margin noborder">
								<input type="radio" name="sort" value="chronological">
								<span class="positive-order">Ealierst</span> 
								<span class="negative-order">Latest</span> 
								Available Time
							</label>
							<label class="btn span-width half-margin noborder">
								<input type="radio" name="sort" value="length">
								<span class="positive-order">Shortest</span> 
								<span class="negative-order">Longest</span> 
								Movie
							</label>
							<label class="btn span-width half-margin noborder">
								<input type="radio" name="sort" value="alphabetical">
								Title 
								<span class="positive-order">A-z</span>
								<span class="negative-order">z-A</span>
							</label>
						</div>
					</div>

				</form>

				<!-- The button to submit the filter/order form -->
				<!-- After submitted, those filters and orders are applied -->
				<div class="round btn padding1 nomargin color-primary color-reverse span-width center" id="filter-sort-apply">
					<strong>APPLY</strong>
				</div>
			</div>


			<!-- The central movie listing area -->
			<div class="card1 color-regular scrollbar overflow-x-hidden overflow-y-scroll">
				<div class="padding2 round flex flex-column flex-align-center">
					<h1 class="iconfont large-icon">&#xe602;</h1><h1> MOVIES MATCHING YOUR SEARCH</h1>
					<span>Click on Arbitrary Movie to View Its Detail and Buy Tickets</span>
				</div>

				<hr/>

				<div id = "movie_index" class="padding2 flex flex-column flex-justify-left flex-nowrap">
					<!-- This is the place where the brief description of all movies will be placed -->
				</div>
			</div>


			<!-- Movie detail, its content will completely be replaced by JS once a movie is selected from the list -->
			<div id = "movie_detail" class="card1 color-secondary g1 flex flex-column span-height">

				<div class="flex flex-column flex-align-center span-width padding2">
					<h2 class="iconfont padding1">&#xe6a3;</h2>
					<h2 class="nopadding">MOVIE DETAIL</h2>
				</div>
				<hr/>


			</div>
		</div>
	</body>
	<!-- Must include the framework load: -->
	<script src="./js/framework.js"></script>
	<!-- Your js code should be loaded from local file: -->
	<script type="module" src="./js/main.js"></script>
</html>
